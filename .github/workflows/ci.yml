name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same ref when a new commit is pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Generate gitignored local config + the module registry the UI imports,
      # so typecheck (which runs before build's prebuild hook) can resolve them.
      - name: Seed config & generate module registry
        run: |
          pnpm seed
          node packages/tooling/gen-modules.mjs

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
